<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candlestick Loader Transparent</title>

<style>
:root {
  --accent: #00ff88;
  --red: #ff5f6d;
}

/* Body: center loader & fade-in on entrance */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;

  background: transparent;  /* page content will show behind */
  opacity: 0;
  transform: scale(0.98);
  animation: fadeIn 0.6s ease forwards;
}

/* Chart container: transparent, no background/border */
.chart {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 0;
}

/* Candle */
.candle {
  position: relative;
  width: 12px;
  display: flex;
  justify-content: center;
  animation: float 2s infinite ease-in-out;
}

/* Wick */
.wick {
  position: absolute;
  width: 2px;
  height: 100%;
  border-radius: 2px;
  opacity: 0.9;
}

/* Body */
.body {
  width: 12px;
  border-radius: 3px;
  z-index: 2;
}

/* GREEN */
.green .body {
  background: var(--accent);
  box-shadow: 0 0 10px rgba(0,255,136,0.6);
}
.green .wick {
  background: var(--accent);
  box-shadow: 0 0 6px rgba(0,255,136,0.6);
}

/* RED */
.red .body {
  background: var(--red);
  box-shadow: 0 0 10px rgba(255,95,109,0.6);
}
.red .wick {
  background: var(--red);
  box-shadow: 0 0 6px rgba(255,95,109,0.6);
}

/* Candle sizes */
.c1 { height: 70px; animation-delay: 0s; }
.c2 { height: 100px; animation-delay: 0.2s; }
.c3 { height: 60px; animation-delay: 0.4s; }
.c4 { height: 110px; animation-delay: 0.6s; }
.c5 { height: 80px; animation-delay: 0.8s; }
.c6 { height: 95px; animation-delay: 1s; }

/* Body placement */
.c1 .body { height: 35px; margin-top: 20px; }
.c2 .body { height: 60px; margin-top: 20px; }
.c3 .body { height: 30px; margin-top: 15px; }
.c4 .body { height: 70px; margin-top: 25px; }
.c5 .body { height: 45px; margin-top: 20px; }
.c6 .body { height: 55px; margin-top: 25px; }

/* Floating */
@keyframes float {
  0%   { transform: translateY(8px); }
  50%  { transform: translateY(-14px); }
  100% { transform: translateY(8px); }
}

/* Fade-in on load */
@keyframes fadeIn {
  to {
    opacity: 1;
    transform: scale(1);
  }
}
</style>
</head>

<body>

<div class="chart">
  <div class="candle green c1"><div class="wick"></div><div class="body"></div></div>
  <div class="candle red c2"><div class="wick"></div><div class="body"></div></div>
  <div class="candle green c3"><div class="wick"></div><div class="body"></div></div>
  <div class="candle green c4"><div class="wick"></div><div class="body"></div></div>
  <div class="candle red c5"><div class="wick"></div><div class="body"></div></div>
  <div class="candle green c6"><div class="wick"></div><div class="body"></div></div>
</div>

</body>
</html>
